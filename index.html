<script>
const DATA=JSON.parse(document.getElementById('embedded-data').textContent);let raw={total:DATA.total||[],tl:DATA.tl||[]};let equipo=DATA.equipo||[];
const $=id=>document.getElementById(id);function t(v){return String(v??'').trim()}function up(v){return t(v).toUpperCase()}function yes(v){return up(v)==='SI'}function no(v){return up(v)==='NO'}function safe(v){return t(v)||'—'}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function norm(v){return String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/^ext[_-]?/,'').replace(/[^a-z0-9]/g,'')}function url(v){return /^https?:\/\//i.test(t(v))}function urls(v){return Array.from(new Set((String(v||'').match(/https?:\/\/[^\s|]+/g)||[]).map(x=>x.trim())))}function imgUrl(u){return /\.(jpg|jpeg|png|webp|gif)(\?|$)/i.test(u)||/mlstatic\.com/i.test(u)}
function csvParse(text){text=String(text||'').replace(/^\uFEFF/,'');const rows=[];let row=[],f='',q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(q){if(c==='"'&&n==='"'){f+='"';i++}else if(c==='"')q=false;else f+=c}else{if(c==='"')q=true;else if(c===','){row.push(f);f=''}else if(c==='\n'){row.push(f);rows.push(row);row=[];f=''}else if(c==='\r'){}else f+=c}}if(f.length||row.length){row.push(f);rows.push(row)}if(!rows.length)return[];const h=rows.shift().map(x=>x.trim());return rows.filter(r=>r.some(x=>t(x))).map(r=>{const o={};h.forEach((k,i)=>o[k]=t(r[i]));return o})}
function toCSV(rows){if(!rows.length)return '';const cols=Object.keys(rows[0]).filter(c=>!c.startsWith('__'));const q=v=>'"'+String(v??'').replace(/"/g,'""')+'"';return [cols.join(','),...rows.map(r=>cols.map(c=>q(r[c])).join(','))].join('\n')}function download(name,content){const b=new Blob([content],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href)}
function analysts(){return new Set(equipo.filter(r=>/^analista/i.test(t(r.Rol))).map(r=>norm(r.ID_MELI)).filter(Boolean))}function enrich(r,i,d){const n=norm(r.Colaborador);const m=equipo.find(e=>norm(e.ID_MELI)===n||norm(e.Nombre)===n)||{};return {...r,__key:d+'_'+i,__norm:n,__dataset:d,__member:m,__role:t(m.Rol),__team:t(m.Equipo)}}let data={total:raw.total.map((r,i)=>enrich(r,i,'total')),tl:raw.tl.map((r,i)=>enrich(r,i,'tl'))};
let st={dataset:'total',tab:'summary',onlyAnalysts:true,search:'',sections:new Set(),actions:new Set(),exp:new Set(),resp:new Set(),prio:new Set(),focus:new Set(),decision:false,code:false,sc:false,selected:new Set(),limit:160,basePage:1,baseSize:25,pedView:'all',pedMode:'grouped',pedPage:1,pedSize:20};
function cur(){return data[st.dataset]||[]}function ce(r){const c=t(r['Codigo esperado']);return c?c:(up(r['Decision esperada']).includes('APROB')?'APROBACIÓN ESPERADA':'SIN CÓDIGO ESPERADO')}function cr(r){return t(r['Codigo respondido'])||'SIN CÓDIGO RESPONDIDO'}function de(r){return up(r['Decision esperada'])||'—'}function dr(r){return up(r['Decision respondida'])||'—'}function decDiff(r){return no(r['Coincide decision'])||(de(r)!=='—'&&dr(r)!=='—'&&de(r)!==dr(r))}function codeDiff(r){return no(r['Coincide codigo'])}function scDiff(r){return yes(r['Difiere S/C'])}
function focus(r){const pair=ce(r)+' '+cr(r),sec=up(r.Seccion),act=up(r.Accion);if(pair.includes('E-DUPA')&&pair.includes('E-NCP'))return 'Duplicidad / existencia';if(pair.includes('E-NCP')&&pair.includes('E-REL'))return 'No corresponde vs relación';if(pair.includes('E-DUPA'))return 'Duplicidad / existencia';if(sec==='IMAGE'||['ADD','REORDER','DELETE'].includes(act)||/E-(IPDP|FI|DC|DV|QR|DP|ICN|IMGI|IMCA)/.test(pair))return 'Imagen / ADD / REORDER';if(decDiff(r))return 'Decisión previa';return 'Otros códigos'}function prio(r){const f=focus(r);if(decDiff(r))return 'Alta';if(f==='Duplicidad / existencia'||f==='No corresponde vs relación')return 'Alta';if(f==='Imagen / ADD / REORDER'&&codeDiff(r))return 'Media';if(codeDiff(r)||scDiff(r))return 'Media';return 'Baja'}function pattern(r){if(t(r['Codigo esperado'])&&ce(r)!==cr(r))return `${ce(r)} esperado → ${cr(r)}`;if(de(r)!==dr(r)&&de(r)!=='—'&&dr(r)!=='—')return `${de(r)} esperado → ${dr(r)}`;if(scDiff(r))return 'Script/TL vs colaborador difiere';return 'Sin desvío detectado'}function help(r){const p=pattern(r),f=focus(r);if(p.includes('E-DUPA')||f==='Duplicidad / existencia')return 'Validar búsqueda en grilla: duplicado/existente no es lo mismo que no corresponde.';if(p.includes('E-NCP')&&p.includes('E-REL'))return 'Separar no correspondencia del producto de problemas de relación.';if(f==='Imagen / ADD / REORDER')return 'Revisar si la imagen ya está, si aporta valor y qué código visual aplica.';if(f==='Decisión previa')return 'Antes del código, definir si la acción debía aprobarse o rechazarse.';return 'Revisar criterio y evidencia del caso antes de definir accionable.'}
function rows(){const set=analysts();return cur().filter(r=>!st.onlyAnalysts||set.has(r.__norm)).filter(r=>{if(st.search&&!Object.values(r).join(' ').toLowerCase().includes(st.search.toLowerCase()))return false;if(st.sections.size&&!st.sections.has(up(r.Seccion)))return false;if(st.actions.size&&!st.actions.has(up(r.Accion)))return false;if(st.exp.size&&!st.exp.has(ce(r)))return false;if(st.resp.size&&!st.resp.has(cr(r)))return false;if(st.prio.size&&!st.prio.has(prio(r)))return false;if(st.focus.size&&!st.focus.has(focus(r)))return false;if(st.decision&&!decDiff(r))return false;if(st.code&&!codeDiff(r))return false;if(st.sc&&!scDiff(r))return false;return true})}function actRows(){return rows().filter(r=>decDiff(r)||codeDiff(r)||scDiff(r))}function uniqueCases(arr){return new Set(arr.map(r=>safe(r['Suggestion ID'])).filter(Boolean)).size}function countBy(arr,fn){const m=new Map();arr.forEach(r=>{const k=fn(r);if(k&&k!=='—')m.set(k,(m.get(k)||0)+1)});return [...m].sort((a,b)=>b[1]-a[1])}function pct(a,b){return b?(a/b*100).toFixed(1).replace('.',',')+'%':'—'}

function qa(label,val){return `<div class="box"><span>${label}</span><b>${val}</b></div>`}function renderSettings(){const a=rows(),r=cur(),set=analysts(),rawA=r.filter(x=>set.has(x.__norm)).length,eqA=equipo.filter(x=>/^analista/i.test(t(x.Rol))).length;$('settings').innerHTML=`<div class="panel"><div class="row"><div><h2>Diagnóstico de consistencia de datos</h2><div class="hint">Control de carga, nómina y coherencia de campos.</div></div><label class="file">Cargar equipo<input type="file" id="teamInput" accept=".csv"></label></div><div class="qa">${qa('Registros crudos',r.length)}${qa('Analistas en nómina',eqA)}${qa('Registros de analistas',rawA)}${qa('Registros filtrados',a.length)}${qa('Código difiere',a.filter(codeDiff).length)}${qa('Con código esperado',a.filter(x=>codeDiff(x)&&t(x['Codigo esperado'])).length)}${qa('Decisión difiere',a.filter(decDiff).length)}${qa('Difiere Script vs Colab',a.filter(scDiff).length)}</div><div class="callout" style="margin-top:18px"><strong>Nota:</strong> “Difiere Script vs Colab” viene del campo original Difiere S/C y no necesariamente coincide con decisión/código.</div></div>`;setTimeout(()=>{const i=$('teamInput');if(i)i.onchange=e=>{const f=e.target.files[0];if(!f)return;const reader=new FileReader();reader.onload=ev=>{equipo=csvParse(ev.target.result);data={total:raw.total.map((r,i)=>enrich(r,i,'total')),tl:raw.tl.map((r,i)=>enrich(r,i,'tl'))};render()};reader.readAsText(f,'utf-8')}},0)}
function checks(title,items,prop){return `<div class="filterSec"><h3>${title}</h3><div class="checks">${items.map(x=>`<label class="check"><input type="checkbox" data-prop="${prop}" value="${esc(x)}" ${st[prop].has(x)?'checked':''}> ${esc(x)}</label>`).join('')}</div></div>`}function renderFilters(){const r=cur(),secs=[...new Set(r.map(x=>up(x.Seccion)).filter(Boolean))].sort(),acts=[...new Set(r.map(x=>up(x.Accion)).filter(Boolean))].sort(),ex=[...new Set(r.map(ce))].sort(),re=[...new Set(r.map(cr))].sort();$('filterBody').innerHTML=`<div class="filterSec"><h3>Búsqueda</h3><input class="text" id="fSearch" value="${esc(st.search)}" placeholder="Colaborador, código, dominio, correction..."></div><div class="filterSec"><h3>Alcance</h3><label class="check"><input type="checkbox" id="fAnalysts" ${st.onlyAnalysts?'checked':''}> Limitar a nómina analista activa</label></div><div class="filterSec"><h3>Desvíos</h3><label class="check"><input type="checkbox" id="fDecision" ${st.decision?'checked':''}> Decisión no coincide</label><label class="check"><input type="checkbox" id="fCode" ${st.code?'checked':''}> Código no coincide</label><label class="check"><input type="checkbox" id="fSC" ${st.sc?'checked':''}> Script/TL vs colaborador difiere</label></div>${checks('Foco',['Duplicidad / existencia','No corresponde vs relación','Decisión previa','Imagen / ADD / REORDER','Otros códigos'],'focus')}${checks('Prioridad',['Alta','Media','Baja'],'prio')}${checks('Sección',secs,'sections')}${checks('Acción',acts,'actions')}${checks('Código esperado',ex,'exp')}${checks('Código respondido',re,'resp')}`}
function applyFilters(){st.search=$('fSearch').value.trim();st.onlyAnalysts=$('fAnalysts').checked;st.decision=$('fDecision').checked;st.code=$('fCode').checked;st.sc=$('fSC').checked;['sections','actions','exp','resp','prio','focus'].forEach(p=>st[p].clear());document.querySelectorAll('#filterBody input[data-prop]').forEach(i=>{if(i.checked)st[i.dataset.prop].add(i.value)});closeDrawer();render()}function openDrawer(){renderFilters();$('drawerBg').classList.add('open');$('drawer').classList.add('open')}function closeDrawer(){$('drawerBg').classList.remove('open');$('drawer').classList.remove('open')}function render(){renderChips();if(st.tab==='summary')renderSummary();if(st.tab==='focus')renderFocus();if(st.tab==='pedagogy')renderPedagogy();if(st.tab==='base')renderBase();if(st.tab==='settings')renderSettings()}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));$('dataset').onchange=e=>{st.dataset=e.target.value;st.selected.clear();st.pedPage=1;render()};$('openFilters').onclick=openDrawer;$('closeFilters').onclick=closeDrawer;$('drawerBg').onclick=closeDrawer;$('applyFilters').onclick=applyFilters;$('clearFilters').onclick=()=>{clearAll();closeDrawer()};$('modalBg').onclick=e=>{if(e.target.id==='modalBg')closeModal()};$('exportBtn').onclick=()=>download('insight_audit_'+st.dataset+'_filtrado.csv',toCSV(rows()));$('csvInput').onchange=e=>{const f=e.target.files[0];if(!f)return;const reader=new FileReader();reader.onload=ev=>{const key='custom_'+Date.now();raw[key]=csvParse(ev.target.result);data[key]=raw[key].map((r,i)=>enrich(r,i,key));const opt=document.createElement('option');opt.value=key;opt.textContent=f.name;$('dataset').appendChild(opt);$('dataset').value=key;st.dataset=key;render()};reader.readAsText(f,'utf-8')};render();
</script></body></html>
