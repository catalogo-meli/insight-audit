:root{
  --bg:#07111f;--bg2:#050b14;--panel:#0d1b2e;--panel2:#13243b;--panel3:#102138;
  --line:#263a56;--line2:#385273;--text:#eaf2ff;--muted:#9fb1ca;--muted2:#c2d3ea;
  --yellow:#ffd400;--yellow2:#ffeb7a;--red:#ff737d;--red2:#ff9aa2;--green:#38d17d;--blue:#72a9ff;
  --shadow:0 22px 70px rgba(0,0,0,.38);--radius:22px
}

a": "matias.lopez@grupokelsoft.com", "Mail Externo": "ext_lopmatia@mercadolibre.com"}, {"ID_MELI": "ext_maminczu", "Nombre": "Matias Minczuk", "Slack_ID": "U04HUQRSCVC", "Rol": "Team Leader", "Equipo": "Ezequiel Galarza Lacaze", "Ubicación": "AMBA", "Fecha Ingreso": "09-01-2023", "CUIL": "20369034570", "Mail Productora": "matias.minczuk@grupokelsoft.com", "Mail Externo": "ext_maminczu@mercadolibre.com"}, {"ID_MELI": "ext_vitofalo", "Nombre": "Victoria Tofalo", "Slack_ID": "U01LEFG7W12", "Rol": "Coordinadora Pedagógica", "Equipo": "Ezequiel Galarza Lacaze", "Ubicación": "AMBA", "Fecha Ingreso": "01-02-2021", "CUIL": "27416642481", "Mail Productora": "victoria.tofalo@grupokelsoft.com", "Mail Externo": "ext_vitofalo@mercadolibre.com"}, {"ID_MELI": "ext_ezegalar", "Nombre": "Ezequiel Galarza Lacaze", "Slack_ID": "U06DQ681K0B", "Rol": "Project Manager", "Equipo": "Ezequiel Galarza Lacaze", "Ubicación": "AMBA", "Fecha Ingreso": "15-01-2024", "CUIL": "20353677587", "Mail Productora": "ezequiel.galarza@grupokelsoft.com", "Mail Externo": "ext_ezegalar@mercadolibre.com"}]}</script><script>
const raw = JSON.parse(document.getElementById('embedded-data').textContent);
const $ = id => document.getElementById(id);
const t = v => (v ?? '').toString().trim();
const up = v => t(v).toUpperCase();
const norm = v => up(v).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');
const yes = v => ['SI','SÍ','YES','TRUE','1'].includes(up(v));
const no = v => ['NO','FALSE','0'].includes(up(v));
const esc = v => t(v).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const slug = v => norm(v).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') || 'sin-valor';
const pct = (a,b) => b ? `${(a/b*100).toFixed(1).replace('.',',')}%` : '0,0%';
const plural = (n,s,p) => n===1?s:p;
function getEquipoSet(){return new Set((raw.equipo||[]).filter(r=>/^analista/i.test(t(r.Rol))).map(r=>norm(r.ID_MELI)).filter(Boolean))}
const equipoSet = getEquipoSet();
function enrich(r,i,d){const n=norm(r.Colaborador);const m=(raw.equipo||[]).find(e=>norm(e.ID_MELI)===n||norm(e.Nombre)===n)||{};return {...r,__key:`${d}_${i}`,__dataset:d,__norm:n,__member:m,__role:t(m.Rol),__team:t(m.Equipo)}}
const data = {total:(raw.total||[]).map((r,i)=>enrich(r,i,'total')), tl:(raw.tl||[]).map((r,i)=>enrich(r,i,'tl'))};
const st = {dataset:'total',tab:'summary',onlyAnalysts:true,globalSearch:'',sections:new Set(),actions:new Set(),exp:new Set(),resp:new Set(),pedUniverse:'validated',pedType:'all',pedMode:'grouped',pedSearch:'',pedPage:1,pedSize:16,openSug:new Set(),patternUniverse:'validated',baseReview:'all',baseDiff:'all',baseSearch:'',basePage:1,baseSize:25};
function cur(){return data[st.dataset]||[]}
function ce(r){return t(r['Codigo esperado']) || 'SIN CÓDIGO ESPERADO'}
function cr(r){return t(r['Codigo respondido']) || 'SIN CÓDIGO RESPONDIDO'}
function de(r){return up(r['Decision esperada']) || '—'}
function dr(r){return up(r['Decision respondida']) || '—'}
function decDiff(r){return no(r['Coincide decision']) || (de(r)!=='—'&&dr(r)!=='—'&&de(r)!==dr(r))}
function codeDiff(r){return no(r['Coincide codigo']) || (ce(r)!=='SIN CÓDIGO ESPERADO' && cr(r)!=='SIN CÓDIGO RESPONDIDO' && ce(r)!==cr(r) && no(r['Coincide codigo']))}
function detectedDiff(r){return decDiff(r)||codeDiff(r)}
function colabStatus(r){return up(r.COLAB||r.Colab||r['COLAB']||'')}
function hasTLValidation(r){return ['OK','NOT OK'].includes(colabStatus(r))}
function tlOk(r){return colabStatus(r)==='OK'}
function tlNotOk(r){return colabStatus(r)==='NOT OK'}
function pattern(r){if(ce(r)!==cr(r))return `${ce(r)} esperado → ${cr(r)}`; if(de(r)!==dr(r)&&de(r)!=='—'&&dr(r)!=='—')return `${de(r)} esperada → ${dr(r)} respondida`; return 'Sin diferencia detectada'}
function globalRowsFrom(arr){return (arr||[]).filter(r=>!st.onlyAnalysts || equipoSet.has(r.__norm)).filter(r=>{const blob=Object.values(r).join(' ').toLowerCase(); if(st.globalSearch && !blob.includes(st.globalSearch.toLowerCase())) return false; if(st.sections.size && !st.sections.has(up(r.Seccion))) return false; if(st.actions.size && !st.actions.has(up(r.Accion))) return false; if(st.exp.size && !st.exp.has(ce(r))) return false; if(st.resp.size && !st.resp.has(cr(r))) return false; return true})}
function rows(){return globalRowsFrom(cur())}
function allFilteredTotal(){return globalRowsFrom(data.total)}
function searchRows(arr,q){const s=t(q).toLowerCase(); if(!s) return arr; return arr.filter(r=>Object.values(r).join(' ').toLowerCase().includes(s))}
function countBy(arr,fn){const m=new Map(); arr.forEach(x=>{const k=fn(x)||'—'; m.set(k,(m.get(k)||0)+1)}); return [...m.entries()].sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0]))}
function groupBySuggestion(arr){const map=new Map(); arr.forEach(r=>{const k=t(r['Suggestion ID'])||'Sin sugerencia'; if(!map.has(k)) map.set(k,[]); map.get(k).push(r)}); return [...map.entries()].map(([id,items])=>({id,items})).sort((a,b)=>b.items.length-a.items.length||a.id.localeCompare(b.id))}
function findRow(key){return [...data.total,...data.tl].find(r=>r.__key===key)}
function kpi(label,num,sub){return `<div class="kpi"><div class="label">${esc(label)}</div><div class="num">${esc(num)}</div><div class="sub">${esc(sub||'')}</div></div>`}
function setTab(tab){st.tab=tab; if(tab==='pedagogy')st.pedPage=1; if(tab==='base')st.basePage=1; render()}
function setDataset(v){st.dataset=v; st.basePage=1; render()}
function chipClass(active){return active?'chip active':'chip'}
function setPedUniverse(v){st.pedUniverse=v; st.pedType='all'; st.pedPage=1; st.openSug.clear(); renderPedagogy()}
function setPedType(v){st.pedType=v; st.pedPage=1; st.openSug.clear(); renderPedagogy()}
function setPedMode(v){st.pedMode=v; st.pedPage=1; renderPedagogy()}
function setPatternUniverse(v){st.patternUniverse=v; renderPatterns()}
function setBaseReview(v){st.baseReview=v; st.basePage=1; renderBase()}
function setBaseDiff(v){st.baseDiff=v; st.basePage=1; renderBase()}
function setPedSearch(v){st.pedSearch=v; st.pedPage=1; renderPedagogy(); restoreFocus('pedSearch')}
function setBaseSearch(v){st.baseSearch=v; st.basePage=1; renderBase(); restoreFocus('baseSearch')}
function restoreFocus(id){setTimeout(()=>{const el=$(id); if(el){el.focus(); el.setSelectionRange(el.value.length,el.value.length)}},0)}
function setGlobalSearch(v){st.globalSearch=v; render()}
function clearGlobalSearch(){st.globalSearch=''; render()}
function toggleSet(name,value){const set=st[name]; set.has(value)?set.delete(value):set.add(value); renderDrawer(); render()}
function clearGlobalFilters(){st.globalSearch=''; st.sections.clear(); st.actions.clear(); st.exp.clear(); st.resp.clear(); renderDrawer(); render()}
function pedBaseRows(){return st.pedUniverse==='validated' ? allFilteredTotal().filter(tlNotOk) : rows().filter(detectedDiff)}
function applyPedType(arr){if(st.pedType==='decision') return arr.filter(decDiff); if(st.pedType==='code') return arr.filter(codeDiff); return arr}
function pedRows(){return searchRows(applyPedType(pedBaseRows()),st.pedSearch)}
function patternRows(){const base = st.patternUniverse==='validated' ? allFilteredTotal().filter(tlNotOk) : rows().filter(detectedDiff); return base}
function sameSuggestionRows(sid){return allFilteredTotal().filter(r=>t(r['Suggestion ID'])===sid && hasTLValidation(r))}
function renderSummary(){const base=rows(),det=base.filter(detectedDiff),audit=base.filter(hasTLValidation),notok=base.filter(tlNotOk),ok=base.filter(tlOk); const topPattern=countBy(det,pattern)[0]; $('summary').innerHTML=`
<div class="panel"><div class="row"><div><h2>Resumen de la muestra</h2><div class="hint">Vista general de diferencias detectadas y revisiones validadas por TL. Usá esta pestaña para entender el volumen antes de entrar al detalle.</div></div><button class="btn primary" onclick="setTab('pedagogy')">Ir a Revisión pedagógica</button></div><div class="kpis" style="margin-top:16px">${kpi('Registros de base',base.length,'Muestra filtrada actual')}${kpi('Diferencias detectadas',det.length,pct(det.length,base.length))}${kpi('Registros auditados por TL',audit.length,pct(audit.length,base.length))}${kpi('Desvíos validados por TL',notok.length,pct(notok.length,audit.length))}${kpi('OK por TL',ok.length,pct(ok.length,audit.length))}</div><div class="callout" style="margin-top:16px"><strong>Modelo de lectura:</strong> las diferencias detectadas surgen de comparar esperado vs respondido. Los desvíos validados por TL corresponden a correcciones auditadas con <strong>COLAB = NOT OK</strong>.</div></div>
<div class="panel"><h2>Lectura operativa</h2><div class="hint">Síntesis automática de la muestra filtrada.</div><div class="callout" style="margin-top:12px">Sobre <strong>${base.length}</strong> registros, se detectan <strong>${det.length}</strong> diferencias por comparación (${pct(det.length,base.length)}). Dentro de la muestra filtrada hay <strong>${audit.length}</strong> correcciones auditadas por TL: <strong>${notok.length}</strong> NOT OK y <strong>${ok.length}</strong> OK. ${topPattern?`El patrón más frecuente es <strong>${esc(topPattern[0])}</strong> (${topPattern[1]}).`:''}</div><div class="chip-row" style="margin-top:14px"><button class="btn" onclick="st.pedUniverse='validated';setTab('pedagogy')">Ver desvíos validados por TL</button><button class="btn" onclick="st.pedUniverse='detected';setTab('pedagogy')">Ver diferencias detectadas</button><button class="btn" onclick="setTab('base')">Explorar base completa</button></div></div>`}
function renderPedagogy(){const universeValidated=st.pedUniverse==='validated', ar=pedRows(), groups=groupBySuggestion(ar), auditBase=allFilteredTotal().filter(hasTLValidation), okCount=auditBase.filter(tlOk).length, notOkCount=auditBase.filter(tlNotOk).length, baseFiltered=rows(); const total=st.pedMode==='grouped'?groups.length:ar.length, pages=Math.max(1,Math.ceil(total/st.pedSize)); if(st.pedPage>pages)st.pedPage=pages; const start=(st.pedPage-1)*st.pedSize, pageItems=(st.pedMode==='grouped'?groups:ar).slice(start,start+st.pedSize); const typeAll=universeValidated?'Todos los desvíos validados':'Todas las diferencias'; const howText=universeValidated?'Esta vista muestra correcciones auditadas por TL marcadas como NOT OK. Si una sugerencia también tiene correcciones OK, no se muestran como desvío, pero se cuentan como contexto.':'Esta vista muestra diferencias entre esperado y respondido. Puede incluir correcciones que luego fueron validadas como OK por TL, por eso no deben leerse automáticamente como errores.'; const rowsLabel=universeValidated?'correcciones NOT OK':'correcciones con diferencia'; $('pedagogy').innerHTML=`
<div class="panel"><div class="row"><div><h2>Revisión pedagógica</h2><div class="hint">Revisá correcciones con desvío validado por TL o diferencias detectadas entre esperado y respondido.</div></div><div class="export-box"><button class="btn primary" onclick="exportPedVisible()">Exportar vista actual</button><div class="export-note">Incluye universo, tipo de revisión, búsqueda y filtros aplicados.</div></div></div><div class="guide" style="margin-top:16px"><div class="guide-block"><div class="guide-head"><span class="step">1</span><div><div class="guide-title">Qué querés revisar</div><div class="micro">Elegí el universo de análisis.</div></div></div><div class="chip-row"><button class="${chipClass(universeValidated)}" onclick="setPedUniverse('validated')">Desvíos validados por TL</button><button class="${chipClass(!universeValidated)}" onclick="setPedUniverse('detected')">Diferencias detectadas</button></div></div><div class="guide-block"><div class="guide-head"><span class="step">2</span><div><div class="guide-title">Qué tipo querés ver</div><div class="micro">Aplicado sobre el universo elegido.</div></div></div><div class="chip-row"><button class="${chipClass(st.pedType==='all')}" onclick="setPedType('all')">${typeAll}</button><button class="${chipClass(st.pedType==='decision')}" onclick="setPedType('decision')">Diferencia de decisión</button><button class="${chipClass(st.pedType==='code')}" onclick="setPedType('code')">Diferencia de código</button></div></div><div class="guide-block"><div class="guide-head"><span class="step">3</span><div><div class="guide-title">Cómo querés verlo</div><div class="micro">Sugerencia agrupa; corrección muestra cada registro.</div></div></div><div class="chip-row"><button class="${chipClass(st.pedMode==='grouped')}" onclick="setPedMode('grouped')">Vista por sugerencia</button><button class="${chipClass(st.pedMode==='individual')}" onclick="setPedMode('individual')">Vista por correcciones</button></div></div></div><div class="method-note ${universeValidated?'validated':'detected'}" style="margin-top:16px"><strong>Cómo leer esta vista:</strong> ${howText}</div></div>
<div class="metric-strip">${universeValidated?`<div class="metric-pill"><b>${groups.length}</b><span>sugerencias con desvío validado</span></div><div class="metric-pill"><b>${ar.length}</b><span>${rowsLabel}</span></div><div class="metric-pill"><b>${auditBase.length}</b><span>correcciones auditadas por TL</span></div><div class="metric-pill"><b>${okCount}</b><span>correcciones OK</span></div>`:`<div class="metric-pill"><b>${groups.length}</b><span>sugerencias con diferencia</span></div><div class="metric-pill"><b>${ar.length}</b><span>${rowsLabel}</span></div><div class="metric-pill"><b>${baseFiltered.length}</b><span>registros de base filtrada</span></div><div class="metric-pill"><b>${ar.filter(tlOk).length}</b><span>diferencias validadas OK por TL</span></div>`}</div>
<div class="panel"><div class="toolbar"><div><h3>Resultados</h3><div class="hint">Mostrando ${total?start+1:0}–${Math.min(start+st.pedSize,total)} de ${total} ${st.pedMode==='grouped'?'sugerencias':'correcciones'}.</div></div><div class="searchbar"><input id="pedSearch" class="input" value="${esc(st.pedSearch)}" oninput="setPedSearch(this.value)" placeholder="Buscar por sugerencia, corrección, colaborador, dominio, código, valor, comentario o link"><button class="btn" onclick="st.pedSearch='';renderPedagogy()">Limpiar</button></div></div><div class="cards" style="margin-top:16px">${pageItems.length ? pageItems.map(x=>st.pedMode==='grouped'?renderSuggestionCard(x,universeValidated):renderCorrectionCard(x,universeValidated)).join('') : emptyState('No hay correcciones para mostrar','No encontramos correcciones que coincidan con este universo, tipo de revisión y búsqueda. Probá limpiar la búsqueda o cambiar el tipo de revisión.')}</div>${pager('ped',st.pedPage,pages)}</div>`}
function renderSuggestionCard(g,validated){const first=g.items[0], sid=g.id, audit=sameSuggestionRows(sid), ok=audit.filter(tlOk).length, notok=audit.filter(tlNotOk).length, open=st.openSug.has(sid), pdp=t(first['Ver PDP']), diffOkInDetected=!validated?g.items.filter(tlOk).length:0; const stats=validated?`${notok} corrección${notok===1?'':'es'} NOT OK · ${audit.length} auditadas por TL · ${ok} OK`:`${g.items.length} corrección${g.items.length===1?'':'es'} con diferencia detectada${diffOkInDetected?` · ${diffOkInDetected} validadas OK por TL`:''}`; return `<article class="suggestion-card ${open?'open':''}"><div class="card-head"><div><div class="id-title">Sugerencia ${esc(sid)}<small>${esc(stats)}</small></div><div class="meta"><span class="pill">Colaborador: ${esc(first.Colaborador)}</span><span class="pill">Dominio: ${esc(first.Dominio)}</span><span class="pill">Acción: ${esc(first.Accion)}</span>${validated?'<span class="pill notok">Desvío validado por TL</span>':'<span class="pill detected">Diferencia detectada</span>'}</div></div><div class="card-actions">${pdp?`<a class="btn small" href="${esc(pdp)}" target="_blank" rel="noopener">Abrir PDP</a>`:''}<button class="btn small primary" onclick="toggleSuggestion('${esc(sid)}')">${open?'Ocultar':'Ver'} ${g.items.length} ${plural(g.items.length,'corrección','correcciones')}</button></div></div>${open?`<div class="mini-list"><div class="micro"><strong>${validated?'Correcciones con desvío validado':'Correcciones con diferencia detectada'}</strong></div>${g.items.map(r=>renderCorrectionCard(r,validated,true)).join('')}</div>`:''}</article>`}
function toggleSuggestion(sid){st.openSug.has(sid)?st.openSug.delete(sid):st.openSug.add(sid); renderPedagogy()}
function renderCorrectionCard(r,validated,mini=false){const img=t(r['URL imagen sugerida']), pdp=t(r['Ver PDP']); const status=tlNotOk(r)?'<span class="pill notok">NOT OK por TL</span>':tlOk(r)?'<span class="pill ok">OK por TL</span>':validated?'<span class="pill">Sin estado TL</span>':'<span class="pill detected">Diferencia detectada</span>'; return `<article class="correction-card"><div class="card-head"><div><div class="id-title">Corrección ${esc(r['Correction ID'])}<small>Sugerencia ${esc(r['Suggestion ID'])} · Producto ${esc(r['Product ID'])}</small></div><div class="meta"><span class="pill">${esc(r.Colaborador)}</span><span class="pill">${esc(r.Dominio)}</span><span class="pill">${esc(r.Accion)}</span>${status}${decDiff(r)?'<span class="pill notok">Diferencia de decisión</span>':''}${codeDiff(r)?'<span class="pill notok">Diferencia de código</span>':''}</div></div><div class="card-actions">${!mini&&pdp?`<a class="btn small" href="${esc(pdp)}" target="_blank" rel="noopener">Abrir PDP</a>`:''}${img?`<a class="btn small" href="${esc(img)}" target="_blank" rel="noopener">Ver imagen</a>`:''}<button class="btn small" onclick="openDetail('${r.__key}')">Ver detalle</button></div></div><div class="compare"><div class="compare-box"><div class="cap">Se esperaba</div><div class="val">${esc(de(r))} · ${esc(ce(r))}</div></div><div class="compare-box"><div class="cap">El analista respondió</div><div class="val">${esc(dr(r))} · ${esc(cr(r))}</div></div></div></article>`}
function renderPatterns(){const validated=st.patternUniverse==='validated', ar=patternRows(); const title=validated?'desvíos validados por TL':'diferencias detectadas'; $('patterns').innerHTML=`<div class="panel"><div class="row"><div><h2>Patrones</h2><div class="hint">Explorá dónde se concentran las diferencias y desvíos según el universo seleccionado.</div></div><div class="chip-row"><button class="${chipClass(validated)}" onclick="setPatternUniverse('validated')">Desvíos validados por TL</button><button class="${chipClass(!validated)}" onclick="setPatternUniverse('detected')">Diferencias detectadas</button></div></div><div class="method-note ${validated?'validated':'detected'}" style="margin-top:14px">Los rankings se calculan sobre <strong>${title}</strong>. Mostramos todos los valores con al menos 1 registro.</div></div><div class="pattern-grid">${barPanel(validated?'Desvíos validados por colaborador':'Diferencias detectadas por colaborador',countBy(ar,r=>up(r.Colaborador)),k=>{st.globalSearch=k;setTab('pedagogy')})}${barPanel('Códigos esperados más frecuentes',countBy(ar,r=>ce(r)),k=>{st.exp=new Set([k]);setTab('pedagogy')})}${barPanel('Códigos respondidos más frecuentes',countBy(ar,r=>cr(r)),k=>{st.resp=new Set([k]);setTab('pedagogy')})}${barPanel('Combinaciones esperado → respondido',countBy(ar,pattern),k=>{})}${barPanel('Dominios',countBy(ar,r=>up(r.Dominio)),k=>{})}${barPanel('Acciones',countBy(ar,r=>up(r.Accion)),k=>{})}</div>`}
function barPanel(title,items,handler){const max=Math.max(1,...items.map(x=>x[1]));return `<div class="panel"><h2>${esc(title)}</h2><div class="bars">${items.length?items.map(([k,v])=>`<div class="bar" title="${esc(k)} · ${v}" onclick="void(0)"><label>${esc(k)}</label><div class="track"><div class="fill" style="width:${v/max*100}%"></div></div><div class="val">${v}</div></div>`).join(''):emptyState('Sin datos','No hay registros para este universo con los filtros actuales.')}</div></div>`}
function baseRows(){let a=rows(); if(st.baseReview==='audited') a=a.filter(hasTLValidation); if(st.baseReview==='unaudited') a=a.filter(r=>!hasTLValidation(r)); if(st.baseReview==='ok') a=a.filter(tlOk); if(st.baseReview==='notok') a=a.filter(tlNotOk); if(st.baseDiff==='with') a=a.filter(detectedDiff); if(st.baseDiff==='without') a=a.filter(r=>!detectedDiff(r)); if(st.baseDiff==='decision') a=a.filter(decDiff); if(st.baseDiff==='code') a=a.filter(codeDiff); return searchRows(a,st.baseSearch)}
function renderBase(){const a=baseRows(), pages=Math.max(1,Math.ceil(a.length/st.baseSize)); if(st.basePage>pages)st.basePage=pages; const start=(st.basePage-1)*st.baseSize, page=a.slice(start,start+st.baseSize); $('base').innerHTML=`<div class="panel"><div class="row"><div><h2>Base completa</h2><div class="hint">Consultá todos los registros de la muestra filtrada. Podés combinar estado de revisión TL con diferencias detectadas.</div></div><div class="export-box"><button class="btn primary" onclick="exportBaseVisible()">Exportar base visible</button><div class="export-note">Incluye filtros, búsqueda y todas las filas coincidentes.</div></div></div><div class="base-controls" style="margin-top:16px"><div class="guide-block"><div class="guide-title">Estado de revisión TL</div><div class="micro">Filtra según validación humana.</div><div class="chip-row" style="margin-top:10px"><button class="${chipClass(st.baseReview==='all')}" onclick="setBaseReview('all')">Todos</button><button class="${chipClass(st.baseReview==='audited')}" onclick="setBaseReview('audited')">Auditados por TL</button><button class="${chipClass(st.baseReview==='unaudited')}" onclick="setBaseReview('unaudited')">No auditados por TL</button><button class="${chipClass(st.baseReview==='ok')}" onclick="setBaseReview('ok')">OK por TL</button><button class="${chipClass(st.baseReview==='notok')}" onclick="setBaseReview('notok')">NOT OK por TL</button></div></div><div class="guide-block"><div class="guide-title">Diferencias detectadas</div><div class="micro">Filtra por comparación esperado vs respondido.</div><div class="chip-row" style="margin-top:10px"><button class="${chipClass(st.baseDiff==='all')}" onclick="setBaseDiff('all')">Todos</button><button class="${chipClass(st.baseDiff==='with')}" onclick="setBaseDiff('with')">Con diferencia</button><button class="${chipClass(st.baseDiff==='without')}" onclick="setBaseDiff('without')">Sin diferencia</button><button class="${chipClass(st.baseDiff==='decision')}" onclick="setBaseDiff('decision')">Diferencia de decisión</button><button class="${chipClass(st.baseDiff==='code')}" onclick="setBaseDiff('code')">Diferencia de código</button></div></div></div></div><div class="panel"><div class="toolbar"><div><h3>Tabla de registros</h3><div class="hint">Mostrando ${a.length?start+1:0}–${Math.min(start+st.baseSize,a.length)} de ${a.length} registros.</div></div><div class="searchbar"><input id="baseSearch" class="input" value="${esc(st.baseSearch)}" oninput="setBaseSearch(this.value)" placeholder="Buscar por ID, colaborador, dominio, código, valor, comentario o link"><button class="btn" onclick="st.baseSearch='';renderBase()">Limpiar</button></div></div><div class="base-table-wrap" style="margin-top:14px"><table class="base-table"><thead><tr><th>Colaborador</th><th>Sugerencia</th><th>Corrección</th><th>Dominio / acción</th><th>Esperado</th><th>Respondido</th><th>Revisión TL</th><th>Diferencias</th><th>Acciones</th></tr></thead><tbody>${page.map(renderBaseRow).join('') || `<tr><td colspan="9">${emptyState('Sin registros','No encontramos registros con estos filtros.')}</td></tr>`}</tbody></table></div>${pager('base',st.basePage,pages)}</div>`}
function renderBaseRow(r){return `<tr><td>${esc(r.Colaborador)}</td><td>${esc(r['Suggestion ID'])}</td><td>${esc(r['Correction ID'])}</td><td>${esc(r.Dominio)}<br><span class="micro">${esc(r.Accion)}</span></td><td>${esc(de(r))}<br><span class="micro">${esc(ce(r))}</span></td><td>${esc(dr(r))}<br><span class="micro">${esc(cr(r))}</span></td><td>${tlNotOk(r)?'<span class="pill notok">NOT OK por TL</span>':tlOk(r)?'<span class="pill ok">OK por TL</span>':hasTLValidation(r)?esc(colabStatus(r)):'<span class="pill">No auditado por TL</span>'}</td><td><div class="status-stack">${decDiff(r)?'<span class="pill notok">Decisión</span>':''}${codeDiff(r)?'<span class="pill notok">Código</span>':''}${!detectedDiff(r)?'<span class="pill ok">Sin diferencia</span>':''}</div></td><td><div class="card-actions"><button class="btn small" onclick="openDetail('${r.__key}')">Ver detalle</button>${t(r['Ver PDP'])?`<a class="btn small" href="${esc(r['Ver PDP'])}" target="_blank">PDP</a>`:''}${t(r['URL imagen sugerida'])?`<a class="btn small" href="${esc(r['URL imagen sugerida'])}" target="_blank">Imagen</a>`:''}</div></td></tr>`}
function pager(kind,page,pages){if(pages<=1)return ''; const prev=`${kind}Page(-1)`, next=`${kind}Page(1)`; return `<div class="pagination"><button class="btn small" onclick="${prev}" ${page<=1?'disabled':''}>Anterior</button><span class="micro">Página ${page} de ${pages}</span><button class="btn small" onclick="${next}" ${page>=pages?'disabled':''}>Siguiente</button></div>`}
function pedPage(d){st.pedPage=Math.max(1,st.pedPage+d); renderPedagogy()}
function basePage(d){st.basePage=Math.max(1,st.basePage+d); renderBase()}
function emptyState(title,msg){return `<div class="empty-state"><strong>${esc(title)}</strong><br><span>${esc(msg)}</span></div>`}
function openDetail(key){const r=findRow(key); if(!r) return; $('modalBackdrop').style.display='block'; $('modal').style.display='block'; $('modal').innerHTML=`<div class="modal-head"><div><h2>Detalle de corrección</h2><div class="hint">Sugerencia ${esc(r['Suggestion ID'])} · Corrección ${esc(r['Correction ID'])}</div></div><button class="btn" onclick="closeDetail()">Cerrar</button></div><div class="modal-body"><div class="detail-grid">${detailSection('Identificación', [['Sugerencia',r['Suggestion ID']],['Corrección',r['Correction ID']],['Producto',r['Product ID']],['Colaborador',r.Colaborador],['Dominio',r.Dominio],['Acción',r.Accion],['Sección',r.Seccion]])}${detailSection('Comparación', [['Decisión esperada',de(r)],['Decisión respondida',dr(r)],['Código esperado',ce(r)],['Código respondido',cr(r)],['Diferencia de decisión',decDiff(r)?'Sí':'No'],['Diferencia de código',codeDiff(r)?'Sí':'No']])}${detailSection('Revisión TL', [['COLAB',colabStatus(r)||'—'],['SCRIPT',r.SCRIPT||r.Script||'—'],['TL auditor',r['TL auditor']||r['Auditor']||'—'],['Comentario',r['Comentario']||r['Comentarios']||r['Comentario TL']||'—']])}<div class="detail-section"><h3>Evidencia</h3><div class="chip-row">${t(r['Ver PDP'])?`<a class="btn" href="${esc(r['Ver PDP'])}" target="_blank">Abrir PDP</a>`:''}${t(r['URL imagen sugerida'])?`<a class="btn" href="${esc(r['URL imagen sugerida'])}" target="_blank">Ver imagen</a>`:''}</div></div></div><div class="detail-section" style="margin-top:12px"><h3>Datos completos</h3>${Object.entries(r).filter(([k])=>!k.startsWith('__')).map(([k,v])=>`<div class="field"><b>${esc(k)}</b><span>${esc(v)}</span></div>`).join('')}</div></div>`}
function detailSection(title,fields){return `<div class="detail-section"><h3>${esc(title)}</h3>${fields.map(([k,v])=>`<div class="field"><b>${esc(k)}</b><span>${esc(v)}</span></div>`).join('')}</div>`}
function closeDetail(){ $('modalBackdrop').style.display='none'; $('modal').style.display='none'; }
function openDrawer(){renderDrawer(); $('drawerBackdrop').style.display='block'; $('drawer').style.display='block'}
function closeDrawer(){ $('drawerBackdrop').style.display='none'; $('drawer').style.display='none'}
function valuesFor(fieldFn,arr=rows()){return countBy(arr,fieldFn).map(x=>x[0]).filter(Boolean).slice(0,80)}
function renderDrawer(){const sections=valuesFor(r=>up(r.Seccion),cur()), actions=valuesFor(r=>up(r.Accion),cur()), exps=valuesFor(r=>ce(r),cur()), resps=valuesFor(r=>cr(r),cur()); $('drawer').innerHTML=`<div class="drawer-head"><div><h2>Filtros globales</h2><div class="hint">Aplican sobre todo el dashboard. La Revisión pedagógica validada usa estos filtros sobre la base total auditada por TL.</div></div><button class="btn" onclick="closeDrawer()">Cerrar</button></div><div class="drawer-body"><div class="filter-group"><h3>Búsqueda global</h3><input class="input" style="width:100%;margin-top:10px" value="${esc(st.globalSearch)}" oninput="setGlobalSearch(this.value)" placeholder="Buscar en todos los campos"></div>${checkGroup('Sección','sections',sections)}${checkGroup('Acción','actions',actions)}${checkGroup('Código esperado','exp',exps)}${checkGroup('Código respondido','resp',resps)}<div class="chip-row"><button class="btn primary" onclick="closeDrawer()">Aplicar</button><button class="btn" onclick="clearGlobalFilters()">Limpiar filtros</button></div></div>`}
function checkGroup(title,name,items){return `<div class="filter-group"><h3>${esc(title)}</h3><div class="check-list" style="margin-top:10px">${items.map(v=>`<label><input type="checkbox" ${st[name].has(v)?'checked':''} onchange="toggleSet('${name}','${esc(v)}')"> <span>${esc(v)}</span></label>`).join('')||'<span class="micro">Sin valores.</span>'}</div></div>`}
function toCSV(arr){const clean=arr.map(r=>Object.fromEntries(Object.entries(r).filter(([k])=>!k.startsWith('__')))); const headers=[...new Set(clean.flatMap(r=>Object.keys(r)))]; const q=v=>`"${t(v).replace(/"/g,'""')}"`; return '\ufeff'+[headers.map(q).join(','),...clean.map(r=>headers.map(h=>q(r[h])).join(','))].join('\n')}
function download(name,content){const blob=new Blob([content],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),500)}
function nowStamp(){const d=new Date(),p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`}
function datasetSlug(){return st.dataset==='tl'?'recorte-tl':'muestra-total'}
function pedSlug(){const u=st.pedUniverse==='validated'?'desvios-validados-tl':'diferencias-detectadas'; return `${u}_${st.pedType}_${st.pedMode}${st.pedSearch?`_busqueda-${slug(st.pedSearch).slice(0,32)}`:''}`}
function baseSlug(){return `revision-${st.baseReview}_diferencias-${st.baseDiff}${st.baseSearch?`_busqueda-${slug(st.baseSearch).slice(0,32)}`:''}`}
function exportPedVisible(){download(`insight-audit-sdc_${datasetSlug()}_revision-pedagogica_${pedSlug()}_${nowStamp()}.csv`,toCSV(pedRows()))}
function exportBaseVisible(){download(`insight-audit-sdc_${datasetSlug()}_base-completa_${baseSlug()}_${nowStamp()}.csv`,toCSV(baseRows()))}
function render(){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===st.tab)); document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===st.tab)); const ds=$('datasetSelect'); if(ds) ds.value=st.dataset; if(st.tab==='summary')renderSummary(); if(st.tab==='pedagogy')renderPedagogy(); if(st.tab==='patterns')renderPatterns(); if(st.tab==='base')renderBase()}
function init(){document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab))); $('datasetSelect').addEventListener('change',e=>setDataset(e.target.value)); $('modalBackdrop').addEventListener('click',closeDetail); $('drawerBackdrop').addEventListener('click',closeDrawer); render()}
document.addEventListener('DOMContentLoaded',init);
</script></body></html>
